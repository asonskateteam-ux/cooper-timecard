<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cooper Timecard</title>
    <meta name="theme-color" content="#111111" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Helvetica, Arial, sans-serif;
            background: #1c1c1e;
            color: #f5f5f7;
        }

        .app {
            max-width: 980px;
            margin: 0 auto;
            padding: 16px 16px 48px;
        }

        header, .card {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 16px;
        }

            header h1 {
                margin: 0;
                font-size: 24px;
            }

            header p {
                margin: 8px 0 0;
                color: #bbb;
                font-size: 14px;
            }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font: 700 15px Helvetica, Arial, sans-serif;
        }

        .tab-btn {
            background: #2c2c2e;
            color: #f5f5f7;
        }

            .tab-btn.active {
                background: #0a84ff;
                color: white;
            }

        .primary {
            background: #0a84ff;
            color: white;
        }

        .secondary {
            background: #3a3a3c;
            color: white;
        }

        .danger {
            background: #9f1d1d;
            color: white;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 13px;
            font-size: 16px;
            font-family: Helvetica, Arial, sans-serif;
            background: #1c1c1e;
            color: #f5f5f7;
        }

        textarea {
            min-height: 76px;
            resize: vertical;
        }

        input:disabled {
            opacity: 0.75;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        @media (min-width: 700px) {
            .grid.two {
                grid-template-columns: 1fr 1fr;
            }

            .grid.three {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .btn-row {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .hint, .muted {
            color: #aaa;
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        .entry-list {
            display: grid;
            gap: 10px;
        }

        .entry-item, .saved-item {
            border: 1px solid #3a3a3c;
            border-radius: 14px;
            padding: 12px;
            background: #1c1c1e;
        }

            .entry-item strong {
                display: block;
                margin-bottom: 4px;
            }

        .entry-meta {
            color: #bbb;
            font-size: 13px;
            margin-top: 6px;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
        }

        .timecard-wrap {
            overflow: hidden;
            width: 100%;
            background: #1c1c1e;
            border-radius: 14px;
        }

        .timecard-scale {
            width: 1130px;
            transform-origin: top left;
        }

        /* ===== Printable timecard template ===== */
        #timecard {
            width: 1130px;
            min-height: 650px;
            background: white;
            color: black;
            padding: 12px;
            font-family: Helvetica, Arial, sans-serif;
            font-stretch: normal;
            letter-spacing: 0;
        }

        .sheet {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border: 3px solid #000;
            font-family: Helvetica, Arial, sans-serif;
            color: #000;
            line-height: 1.08;
        }

            .sheet td,
            .sheet th {
                border: 1.8px solid #000;
                padding: 4px 7px;
                vertical-align: middle;
                overflow: hidden;
                font-weight: 400;
            }

        .thick-bottom td,
        .thick-bottom th {
            border-bottom-width: 3px;
        }

        .title-cell {
            height: 48px;
            text-align: center;
            font-size: 21px;
            font-weight: 600 !important;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .info-cell {
            height: 46px;
            font-size: 16px;
            font-weight: 500 !important;
            white-space: nowrap;
        }

        .header-cell {
            height: 52px;
            text-align: center;
            font-size: 16px;
            font-weight: 500 !important;
        }

        .hours-header {
            text-align: center;
            font-size: 16px;
            font-weight: 500 !important;
            line-height: 1.05;
        }

        .line-row td {
            height: 31px;
            font-size: 15px;
            font-weight: 400;
        }

        .ro-cell,
        .desc-cell,
        .hours-cell {
            text-align: center;
        }

        .hours-cell {
            white-space: nowrap;
        }

        .time-label {
            font-size: 13px !important;
            font-weight: 600 !important;
            text-align: left;
        }

        .time-value {
            text-align: right;
            font-size: 15px !important;
            padding-right: 18px !important;
        }

        .signature-cell {
            height: 54px;
            font-size: 14px;
            white-space: nowrap;
            vertical-align: middle !important;
        }

        .bottom-head {
            height: 26px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }

        .bottom-value {
            height: 28px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <h1>Cooper Timecard</h1>
            <p>Daily serviceman time card generator</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="newTabBtn" onclick="showTab('new')">New Card</button>
            <button class="tab-btn" id="savedTabBtn" onclick="showTab('saved')">Saved Timecards</button>
        </div>

        <section id="newTab">
            <div class="card">
                <div class="grid three">
                    <div>
                        <label>Date</label>
                        <input id="dateInput" type="date" />
                    </div>
                    <div>
                        <label>Tech ID</label>
                        <input value="2918CL" disabled />
                    </div>
                    <div>
                        <label>Name</label>
                        <input value="COOPER LANE" disabled />
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-top:0;">Add Job Entry</h2>

                <div class="grid two">
                    <div>
                        <label>R/O Number</label>
                        <input id="roInput" list="roSuggestions" oninput="handleROInput()" placeholder="Example: 566839" />
                        <datalist id="roSuggestions"></datalist>
                    </div>
                    <div>
                        <label>Hours Worked</label>
                        <input id="hoursInput" type="number" step="0.25" placeholder="Example: 6.75" />
                    </div>
                </div>

                <div style="margin-top:12px;">
                    <label>Customer & Job Description</label>
                    <textarea id="descriptionInput" placeholder="Example: EPE 1050K"></textarea>
                </div>

                <div class="grid two" style="margin-top:12px;">
                    <div>
                        <label>Start Time</label>
                        <input id="startInput" type="time" />
                    </div>
                    <div>
                        <label>Calculated Stop Time</label>
                        <input id="stopPreview" disabled />
                    </div>
                </div>

                <p class="hint">Use <strong>Add Entry</strong> for jobs. Use <strong>Lunch</strong> to insert a lunch row between jobs. Lunch does not add to worked hours.</p>

                <div class="btn-row">
                    <button class="secondary" onclick="calculatePreview()">Calculate</button>
                    <button class="primary" onclick="addEntry()">Add Entry</button>
                    <button class="secondary" onclick="addLunchRow()">Lunch</button>
                    <button class="primary" onclick="submitTimecard()">Submit Timecard</button>
                    <button class="secondary" onclick="downloadJPEG()">Download JPEG</button>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-top:0;">Current Entries</h2>
                <div id="entryList" class="entry-list"></div>
            </div>

            <div class="card">
                <h2 style="margin-top:0;">Timecard Preview</h2>
                <div class="timecard-wrap" id="timecardWrap">
                    <div class="timecard-scale" id="timecardScale">
                        <div id="timecard">
                            <table class="sheet">
                                <colgroup>
                                    <col style="width:19%">
                                    <col style="width:41%">
                                    <col style="width:13%">
                                    <col style="width:8%">
                                    <col style="width:9%">
                                    <col style="width:5%">
                                    <col style="width:5%">
                                </colgroup>
                                <tbody id="sheetBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="savedTab" class="hidden">
            <div class="card">
                <h2 style="margin-top:0;">Saved Timecards</h2>
                <div id="savedList"></div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
        const TECH_ID = '2918CL';
        const TECH_NAME = 'COOPER LANE';

        let entries = [];
        let loadedSavedId = null;

        function todayLocalDateValue() {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function formatDateForSheet(value) {
            if (!value) return '';
            const [yyyy, mm, dd] = value.split('-');
            return `${dd}/${mm}/${yyyy}`;
        }

        function parseTimeToMinutes(time) {
            if (!time || !time.includes(':')) return null;
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        }

        function minutesToTime(totalMinutes) {
            const mins = ((totalMinutes % 1440) + 1440) % 1440;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function calculateStop(startTime, hours) {
            const startMins = parseTimeToMinutes(startTime);
            if (startMins === null || isNaN(hours)) return '';
            return minutesToTime(startMins + Math.round(Number(hours) * 60));
        }

        function formatHoursDecimal(hours) {
            const totalMinutes = Math.round(Number(hours || 0) * 60);
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h}:${String(m).padStart(2, '0')} hours`;
        }

        function formatTotalHours(hours) {
            const totalMinutes = Math.round(Number(hours || 0) * 60);
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h}:${String(m).padStart(2, '0')}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function getROHistory() {
            return JSON.parse(localStorage.getItem('roHistory') || '{}');
        }

        function saveROHistory(ro, description) {
            if (!ro || !description) return;
            const history = getROHistory();
            history[ro] = description;
            localStorage.setItem('roHistory', JSON.stringify(history));
            refreshROSuggestions();
        }

        function refreshROSuggestions() {
            const history = getROHistory();
            const list = document.getElementById('roSuggestions');
            list.innerHTML = '';
            Object.keys(history).sort().forEach(ro => {
                const option = document.createElement('option');
                option.value = ro;
                option.label = history[ro];
                list.appendChild(option);
            });
        }

        function handleROInput() {
            const ro = document.getElementById('roInput').value.trim();
            const history = getROHistory();
            if (history[ro]) document.getElementById('descriptionInput').value = history[ro];
        }

        function calculatePreview() {
            const start = document.getElementById('startInput').value;
            const hours = Number(document.getElementById('hoursInput').value);
            document.getElementById('stopPreview').value = calculateStop(start, hours);
        }

        function addEntry() {
            const ro = document.getElementById('roInput').value.trim();
            const description = document.getElementById('descriptionInput').value.trim();
            const hours = Number(document.getElementById('hoursInput').value);
            const start = document.getElementById('startInput').value;
            const stop = calculateStop(start, hours);

            if (!ro || !description || !hours || !start) {
                alert('Please fill R/O, description, hours and start time.');
                return;
            }

            entries.push({
                id: crypto.randomUUID(),
                type: 'work',
                ro,
                description,
                hours,
                start,
                stop
            });

            saveROHistory(ro, description);
            clearEntryForm();
            loadedSavedId = null;
            renderAll();
            document.getElementById('roInput').focus();
        }

        function addLunchRow() {
            entries.push({
                id: crypto.randomUUID(),
                type: 'lunch',
                description: 'Lunch'
            });
            loadedSavedId = null;
            renderAll();
        }

        function clearEntryForm() {
            document.getElementById('roInput').value = '';
            document.getElementById('descriptionInput').value = '';
            document.getElementById('hoursInput').value = '';
            document.getElementById('startInput').value = '';
            document.getElementById('stopPreview').value = '';
        }

        function removeEntry(id) {
            entries = entries.filter(e => e.id !== id);
            renderAll();
        }

        function renderEntries() {
            const list = document.getElementById('entryList');
            if (!entries.length) {
                list.innerHTML = '<p class="muted">No entries added yet.</p>';
                return;
            }

            list.innerHTML = entries.map(e => {
                if (e.type === 'lunch') {
                    return `
                <div class="entry-item">
                  <strong>Lunch</strong>
                  <div class="entry-meta">Unpaid lunch row. Not counted in total hours.</div>
                  <button class="danger" style="margin-top:10px;padding:8px 12px;" onclick="removeEntry('${e.id}')">Remove</button>
                </div>
              `;
                }

                return `
              <div class="entry-item">
                <strong>R/O ${escapeHtml(e.ro)} — ${escapeHtml(e.description)}</strong>
                <div class="entry-meta">${e.start} to ${e.stop} | ${formatHoursDecimal(e.hours)}</div>
                <button class="danger" style="margin-top:10px;padding:8px 12px;" onclick="removeEntry('${e.id}')">Remove</button>
              </div>
            `;
            }).join('');
        }

        function buildWorkRows(e) {
            return `
            <tr class="line-row">
              <td rowspan="2" class="ro-cell">${escapeHtml(e.ro)}</td>
              <td rowspan="2" class="desc-cell">${escapeHtml(e.description)}</td>
              <td rowspan="2" class="hours-cell">${formatHoursDecimal(e.hours)}</td>
              <td class="time-label">start</td>
              <td colspan="3" class="time-value">${e.start}</td>
            </tr>
            <tr class="line-row">
              <td class="time-label">stop</td>
              <td colspan="3" class="time-value">${e.stop}</td>
            </tr>
          `;
        }

        function buildLunchRows() {
            return `
            <tr class="line-row">
              <td rowspan="2"></td>
              <td rowspan="2" class="desc-cell">Lunch</td>
              <td rowspan="2"></td>
              <td class="time-label">start</td>
              <td colspan="3"></td>
            </tr>
            <tr class="line-row">
              <td class="time-label">stop</td>
              <td colspan="3"></td>
            </tr>
          `;
        }

        function buildBlankRows(count) {
            let html = '';
            for (let i = 0; i < count; i++) {
                html += `
              <tr class="line-row">
                <td rowspan="2"></td>
                <td rowspan="2"></td>
                <td rowspan="2"></td>
                <td class="time-label">start</td>
                <td colspan="3"></td>
              </tr>
              <tr class="line-row">
                <td class="time-label">stop</td>
                <td colspan="3"></td>
              </tr>
            `;
            }
            return html;
        }

        function renderSheet() {
            const total = entries
                .filter(e => e.type === 'work')
                .reduce((sum, e) => sum + Number(e.hours || 0), 0);

            let html = `
            <tr class="thick-bottom">
              <td colspan="2"></td>
              <td colspan="5" class="title-cell">SERVICEMAN DAILY TIME CARD</td>
            </tr>
            <tr class="thick-bottom">
              <td class="info-cell">Tech ID: 2918CL</td>
              <td class="info-cell">Name: COOPER LANE</td>
              <td></td>
              <td colspan="4" class="info-cell">DATE: ${formatDateForSheet(document.getElementById('dateInput').value)}</td>
            </tr>
            <tr class="thick-bottom">
              <th class="header-cell">R/O No.</th>
              <th class="header-cell">Customer and Job descriptions/Material used</th>
              <th class="hours-header">Number<br>of hours</th>
              <th colspan="4"></th>
            </tr>
          `;

            entries.forEach(e => {
                html += e.type === 'lunch' ? buildLunchRows() : buildWorkRows(e);
            });

            html += buildBlankRows(Math.max(0, 6 - entries.length));

            html += `
            <tr>
              <td class="signature-cell">Serviceman's Signature: CDL</td>
              <td class="signature-cell">Service Manager Signature:</td>
              <td class="bottom-head">Total Hrs.</td>
              <td colspan="2" class="bottom-head">Overtime</td>
              <td colspan="2" class="bottom-head">Sick Hrs</td>
            </tr>
            <tr>
              <td></td>
              <td></td>
              <td class="bottom-value">${formatTotalHours(total)}</td>
              <td colspan="2"></td>
              <td colspan="2"></td>
            </tr>
          `;

            document.getElementById('sheetBody').innerHTML = html;
        }

        function fitTimecardPreview() {
            const wrap = document.getElementById('timecardWrap');
            const scaleEl = document.getElementById('timecardScale');
            const card = document.getElementById('timecard');
            if (!wrap || !scaleEl || !card) return;

            const scale = Math.min(1, wrap.clientWidth / 1130);
            scaleEl.style.transform = `scale(${scale})`;
            scaleEl.style.height = `${card.offsetHeight * scale}px`;
        }

        function renderAll() {
            renderEntries();
            renderSheet();
            renderSavedList();
            setTimeout(fitTimecardPreview, 0);
        }

        function submitTimecard() {
            if (!entries.length) {
                alert('Add at least one entry first.');
                return;
            }

            const saved = JSON.parse(localStorage.getItem('savedTimecards') || '[]');
            const card = {
                id: loadedSavedId || crypto.randomUUID(),
                date: document.getElementById('dateInput').value,
                techId: TECH_ID,
                techName: TECH_NAME,
                entries: JSON.parse(JSON.stringify(entries)),
                savedAt: new Date().toISOString()
            };

            const existingIndex = saved.findIndex(x => x.id === card.id);
            if (existingIndex >= 0) saved[existingIndex] = card;
            else saved.unshift(card);

            localStorage.setItem('savedTimecards', JSON.stringify(saved));
            loadedSavedId = card.id;
            alert('Timecard submitted and saved.');
            renderSavedList();
        }

        function renderSavedList() {
            const saved = JSON.parse(localStorage.getItem('savedTimecards') || '[]');
            const list = document.getElementById('savedList');
            if (!saved.length) {
                list.innerHTML = '<p class="muted">No saved timecards yet.</p>';
                return;
            }

            list.innerHTML = saved.map(card => {
                const total = card.entries
                    .filter(e => e.type === 'work')
                    .reduce((sum, e) => sum + Number(e.hours || 0), 0);

                return `
              <div class="saved-item">
                <div>
                  <strong>${formatDateForSheet(card.date)}</strong>
                  <div class="muted">${card.entries.length} rows | ${formatTotalHours(total)} hrs</div>
                </div>
                <div>
                  <button class="secondary" onclick="loadSaved('${card.id}')">Open</button>
                  <button class="danger" onclick="deleteSaved('${card.id}')">Delete</button>
                </div>
              </div>
            `;
            }).join('');
        }

        function loadSaved(id) {
            const saved = JSON.parse(localStorage.getItem('savedTimecards') || '[]');
            const card = saved.find(x => x.id === id);
            if (!card) return;

            loadedSavedId = card.id;
            entries = card.entries;
            document.getElementById('dateInput').value = card.date;
            showTab('new');
            renderAll();
        }

        function deleteSaved(id) {
            if (!confirm('Delete this saved timecard?')) return;
            let saved = JSON.parse(localStorage.getItem('savedTimecards') || '[]');
            saved = saved.filter(x => x.id !== id);
            localStorage.setItem('savedTimecards', JSON.stringify(saved));
            if (loadedSavedId === id) loadedSavedId = null;
            renderSavedList();
        }

        async function downloadJPEG() {
            renderSheet();
            const card = document.getElementById('timecard');
            const canvas = await html2canvas(card, { backgroundColor: '#ffffff', scale: 2 });
            const link = document.createElement('a');
            const date = document.getElementById('dateInput').value || todayLocalDateValue();
            link.download = `timecard-${date}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }

        function showTab(tab) {
            document.getElementById('newTab').classList.toggle('hidden', tab !== 'new');
            document.getElementById('savedTab').classList.toggle('hidden', tab !== 'saved');
            document.getElementById('newTabBtn').classList.toggle('active', tab === 'new');
            document.getElementById('savedTabBtn').classList.toggle('active', tab === 'saved');
            renderSavedList();
        }

        document.getElementById('dateInput').value = todayLocalDateValue();
        document.getElementById('dateInput').addEventListener('change', renderAll);
        document.getElementById('hoursInput').addEventListener('input', calculatePreview);
        document.getElementById('startInput').addEventListener('change', calculatePreview);
        window.addEventListener('resize', fitTimecardPreview);

        refreshROSuggestions();
        renderAll();
    </script>
</body>
</html>
